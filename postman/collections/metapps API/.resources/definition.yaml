$kind: collection
name: metapps API
description: |-
  Full API collection for the metapps project.
  Covers backend REST endpoints (Auth, Goals, Tasks, System, Protected Utility)
  and the internal AI service endpoint.
variables:
  - key: backendBaseUrl
    value: 'http://localhost:8080'
    description: Base URL for the backend service
  - key: aiServiceBaseUrl
    value: 'http://localhost:8000'
    description: Base URL for the AI service
  - key: accessToken
    value: ''
    description: Bearer token obtained after login
  - key: refreshToken
    value: ''
    description: Refresh token (stored as HttpOnly cookie by the server)
  - key: goalId
    value: '11111111-1111-1111-1111-111111111111'
    description: Example goal UUID for path variable requests
  - key: taskId
    value: '11111111-1111-1111-1111-111111111111'
    description: Example task UUID for path variable requests
