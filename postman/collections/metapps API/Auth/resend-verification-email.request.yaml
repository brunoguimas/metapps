$kind: http-request
name: Resend Verification Email
method: POST
url: '{{backendBaseUrl}}/auth/email/resend'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com"
    }
