$kind: http-request
name: Submit Task Attempt
method: POST
url: '{{backendBaseUrl}}/protected/tasks/{{taskId}}/attempts'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
  - key: Authorization
    value: 'Bearer {{accessToken}}'
body:
  type: json
  content: |-
    {
      "type": "quiz",
      "response": [
        {
          "question_index": 0,
          "answer": 2
        },
        {
          "question_index": 1,
          "answer": 1
        }
      ],
      "metadata": {
        "time_spent_ms": 45000,
        "attempt_source": "web"
      }
    }
