$kind: http-request
name: Get Goal by ID
method: GET
url: '{{backendBaseUrl}}/protected/goals/:id'
order: 3000
headers:
  - key: Accept
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
pathVariables:
  - key: id
    value: '{{goalId}}'
    description: UUID of the goal to retrieve
