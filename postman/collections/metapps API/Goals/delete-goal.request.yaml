$kind: http-request
name: Delete Goal
method: DELETE
url: '{{backendBaseUrl}}/protected/goals/:id'
order: 5000
headers:
  - key: Accept
    value: application/json
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
pathVariables:
  - key: id
    value: '{{goalId}}'
    description: UUID of the goal to delete
