version: "2"
sql:
  - schema: "internal/platform/database/migrations"
    queries: "internal/platform/database/queries"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/platform/database/db"
        overrides:
          - db_type: "jsonb"
            nullable: true
            go_type: "encoding/json.RawMessage"
