<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Código de verificação</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f8;padding:40px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:10px;padding:40px;box-shadow:0 4px 16px rgba(0,0,0,0.06);">

                    <tr>
                        <td align="center" style="padding-bottom:10px;">
                            <h1 style="margin:0;font-size:26px;color:#111827;">
                                Confirme seu email
                            </h1>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="color:#6b7280;font-size:14px;padding-bottom:30px;">
                            Leva menos de 10 segundos
                        </td>
                    </tr>

                    <tr>
                        <td style="color:#374151;font-size:16px;line-height:1.6;padding-bottom:25px;">
                            Olá <strong>{{.Username}}</strong>,<br><br>

                            Use o código abaixo para confirmar seu endereço de email:

                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding:20px 0;">
                            <div style="
display:inline-block;
background:#f3f4f6;
color:#111827;
padding:18px 28px;
border-radius:10px;
font-size:34px;
letter-spacing:10px;
font-weight:bold;
font-family:monospace;">
                                {{.Code}}
                            </div>
                        </td>
                    </tr>

                    <tr>
                        <td align="center" style="padding-top:10px;color:#6b7280;font-size:14px;">
                            Digite esse código no app para continuar
                        </td>
                    </tr>

                    <tr>
                        <td style="color:#6b7280;font-size:14px;line-height:1.6;padding-top:25px;text-align:center;">
                            <b>Este código expira em alguns minutos.</b>
                        </td>
                    </tr>

                    <tr>
                        <td
                            style="padding-top:35px;border-top:1px solid #e5e7eb;font-size:13px;color:#9ca3af;text-align:center;">
                            Se você não criou esta conta, pode ignorar este email com segurança.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
